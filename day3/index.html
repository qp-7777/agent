<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>AI对话Demo</title>
    <!-- marked md解析（v12+ parse 是异步的，用 @4 确保同步 API） -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
    <!-- 代码高亮样式 + js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .chat-box {
            height: 500px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 16px;
            overflow-y: auto;
            margin-bottom: 16px;
        }

        .msg-item {
            margin: 12px 0;
        }

        .user-msg {
            text-align: right;
        }

        .user-msg .content {
            background: #1677ff;
            color: #fff;
            padding: 8px 12px;
            border-radius: 12px 2px 12px 12px;
            display: inline-block;
            max-width: 70%;
        }

        .ai-msg .content {
            background: #f5f5f5;
            padding: 8px 12px;
            border-radius: 2px 12px 12px 12px;
            display: inline-block;
            max-width: 70%;
        }

        .skeleton {
            width: 200px;
            height: 16px;
            background: #e8e8e8;
            border-radius: 4px;
            animation: flicker 1.2s infinite;
        }

        @keyframes flicker {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        #input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        #send {
            padding: 0 20px;
            background: #1677ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* 代码块样式 + 复制按钮 */
        pre {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            position: relative;
            margin: 8px 0;
        }

        code {
            font-family: Consolas;
        }

        .copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 12px;
            padding: 2px 10px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>

<body>
    <div class="chat-box" id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="输入提问...">
        <button id="send">发送</button>
    </div>

    <script>
        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            },
            gfm: true, // 开启github标准md（表格、代码块）
            breaks: true, // 回车自动换行
        });


        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        // 全局变量
        let sse = null;
        let buffer = '';
        let aiText = '';
        let aiMsgDom = null;

        // 自动滚动到底部
        function scrollBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        // 给所有pre添加复制按钮
        function bindCopyBtn(container) {
            const pres = container.querySelectorAll('pre');
            console.log('bindCopyBtn 找到的 pre 数量:', pres.length);
            pres.forEach(pre => {
                const codeText = pre.innerText;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.innerText = '复制';
                btn.onclick = async () => {
                    try {
                        await navigator.clipboard.writeText(codeText);
                        btn.innerText = '已复制';
                        setTimeout(() => btn.innerText = '复制', 1500);
                    } catch {
                        // 降级方案：用 textarea 复制
                        const ta = document.createElement('textarea');
                        ta.value = codeText;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        btn.innerText = '已复制';
                        setTimeout(() => btn.innerText = '复制', 1500);
                    }
                };
                pre.appendChild(btn);
            })
        }
        // 添加用户消息dom
        function addUserMsg(text) {
            const wrap = document.createElement('div');
            wrap.className = 'msg-item user-msg';
            wrap.innerHTML = `<div class="content">${text}</div>`;
            chatBox.appendChild(wrap);
            scrollBottom();
        }

        // 创建AI消息占位，先展示骨架屏
        function createAiBlock() {
            const wrap = document.createElement('div');
            wrap.className = 'msg-item ai-msg';
            wrap.innerHTML = `<div class="content skeleton" id="aiTemp"></div>`;
            chatBox.appendChild(wrap);
            scrollBottom();
            // 返回文本容器dom
            return wrap.querySelector('.content');
        }

        // 回车触发发送
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // 发送按钮点击
        sendBtn.onclick = () => {
            const text = input.value.trim();
            if (!text || sse) return;
            addUserMsg(text);
            input.value = '';

            // 初始化AI消息块，骨架加载
            aiMsgDom = createAiBlock();
            aiMsgDom.className = 'content';
            aiMsgDom.innerText = '';
            aiText = '';
            buffer = '';

            // 开启SSE连接
            sse = new EventSource('http://localhost:3000/stream');

            sse.onmessage = (e) => {
                if (!e.data) return;
                if (e.data === '[DONE]') {
                    sse.close();
                    sse = null;
                    // 流结束，渲染完整Markdown富文本
                    try {
                        const mdHtml = marked.parse(aiText);
                        // 兼容 marked 返回 Promise 的情况（v12+）
                        Promise.resolve(mdHtml).then(html => {
                            aiMsgDom.innerHTML = html;
                            // 先绑定复制按钮，再高亮
                            bindCopyBtn(aiMsgDom);
                            aiMsgDom.querySelectorAll('pre code').forEach(el => {
                                try { hljs.highlightElement(el); } catch (e) { console.warn('highlight 失败', e); }
                            })
                            scrollBottom();
                        });
                    } catch (err) {
                        // marked 报错时降级显示纯文本
                        console.error('marked 解析失败', err);
                        aiMsgDom.innerText = aiText;
                    }
                    return;
                }
                try {
                    const res = JSON.parse(e.data);
                    const word = res.choices[0].delta.content;
                    aiText += word;
                    aiMsgDom.innerText = aiText;
                    scrollBottom();
                } catch (err) {
                    console.log('解析失败', err);
                }
            }

            sse.onerror = () => {
                aiMsgDom.innerText += '\n连接出错，传输中断';
                sse.close();
                sse = null;
            }
        }
    </script>
</body>

</html>
